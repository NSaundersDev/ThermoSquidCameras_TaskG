<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Gallery</title>
  <link rel="stylesheet" href="/css/media_gallery.css">
</head>
<body>
  <header>
    <h1>MEDIA GALLERY</h1>
   <nav>
    <input type="date" id="date-filter">
    <button id="refresh-images">Refresh</button>
  </nav>
  </header>
  <main>
    <div id="image-grid"></div>
  </main>
  <div id="modal" class="modal" style="padding:1em;padding-bottom:0.5em;padding-top:3em;">
    <span style="display:inline-flex;gap:0.1em;">
        <span>
          <img id="modal-image" src="" alt="Full-size image">
          <div class="modal-actions" style="margin-bottom:0;">
            <button id="modal-download">Download</button>
            <button id="modal-delete">Delete</button>
          </div>    
        </span>
        <span id="modal-close" class="modal-close">&times;</span>        
    </span>
  </div>
  <div id="status-message"></div>
</body>
</html>
<script type="module" src="media_gallery.js"></script>
