<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Manager</title>
  <link rel="stylesheet" href="/css/image_manager.css">

</head>
<body>
  <header>
    <h1>IMAGE MANAGER</h1>
   <nav>
    <input type="date" id="date-filter">
    <button id="refresh-images">Refresh</button>
    <button id="delete-old-images">Delete Old (7+ days)</button>
    <button id="download-all">Download All</button>
  </nav>
  </header>
  <main>
    <div id="image-grid"></div>
  </main>
  <div id="modal" class="modal">
    <span id="modal-close" class="modal-close">&times;</span>
    <img id="modal-image" src="" alt="Full-size image">
    <div class="modal-actions">
      <button id="modal-download">Download</button>
      <button id="modal-delete">Delete</button>
    </div>
  </div>
  <div id="status-message"></div>

</body>
</html>
<script type="module">
  import { Config } from './js/config.js';

  let ws = null;
  let currentImages = [];
  let currentPage = 1;

  function connectWebSocket() {
    const host = window.location.hostname;
    ws = new WebSocket(`ws://${host}:3000/ws`);

    ws.onopen = () => {
      console.log('Image WebSocket connected');
      fetchImages();
    };

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        console.log('WebSocket received:', data);

        if (data.status === 'image_list') {
          currentImages = data.images || [];
          currentPage = 1;
          renderImages();
        } 
        else if (data.status === 'deleted' || data.status === 'deleted_old') {
          showStatus(data.status === 'deleted' 
            ? `Deleted image for ${data.door}` 
            : `Deleted ${data.count} old images`);
          fetchImages();
        } 
        else if (data.status === 'error') {
          showStatus(data.message, 4000, true);
        }
      } catch (err) {
        console.error('WebSocket message error:', err);
      }
    };

    ws.onclose = () => {
      showStatus('Image service disconnected', 4000, true);
    };

    ws.onerror = (err) => {
      console.error('WebSocket error:', err);
      showStatus('Image WebSocket error', 4000, true);
    };
  }

function fetchImages() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  const dateEl = document.getElementById('date-filter');
  const date = dateEl ? dateEl.value : '';

  ws.send(JSON.stringify({
    action: 'list_images',
    door: null,      // Always request everything
    date: date || null
  }));
}

function showStatus(message, duration = 3000, isError = false) {
  const status = document.getElementById('status-message');
  if (!status) return;

  status.textContent = message;
  status.className = isError ? 'error' : 'fade-in';
  status.style.display = 'block';

  setTimeout(() => {
    status.classList.remove('fade-in');
    status.classList.add('fade-out');
    setTimeout(() => {
      status.textContent = '';
      status.style.display = 'none';
      status.classList.remove('fade-out', 'error');
    }, 300);
  }, duration);
}

  function renderImages() {
    const grid = document.getElementById('image-grid');
    grid.innerHTML = '';

    if (!currentImages.length) {
      grid.innerHTML = '<p style="padding: 2rem; color: #666;">No images or clips found.</p>';
      return;
    }

    const imagesPerPage = 20;
    const start = (currentPage - 1) * imagesPerPage;
    const end = start + imagesPerPage;
    const pageItems = currentImages.slice(start, end);

    pageItems.forEach(img => {
      const card = document.createElement('div');
      card.className = 'image-card';

      const isVideo = img.path.endsWith('.webm') || 
                      img.path.endsWith('.mp4') || 
                      img.path.endsWith('.mov');

      let mediaHTML = '';
      if (isVideo) {
        mediaHTML = `
          <video src="${img.path}" controls muted preload="metadata" style="width:100%; border-radius:6px;"></video>
        `;
      } else {
        mediaHTML = `
          <img src="${img.path}" alt="${img.door} media" loading="lazy">
        `;
      }

      card.innerHTML = `
        ${mediaHTML}
        <p>${new Date(img.timestamp).toLocaleString()}</p>
        <button class="view-btn">View</button>
      `;

      // Attach click handler properly
      card.querySelector('.view-btn').onclick = () => {
        showModal(img.path, img.door, img.timestamp, isVideo);
      };

      grid.appendChild(card);
    });

    // Pagination
    const totalPages = Math.ceil(currentImages.length / imagesPerPage);
    if (totalPages > 1) {
      const pagination = document.createElement('div');
      pagination.className = 'pagination';
      pagination.innerHTML = `
        <button ${currentPage === 1 ? 'disabled' : ''}>Previous</button>
        <span>Page ${currentPage} / ${totalPages}</span>
        <button ${currentPage === totalPages ? 'disabled' : ''}>Next</button>
      `;

      pagination.children[0].onclick = () => changePage(currentPage - 1);
      pagination.children[2].onclick = () => changePage(currentPage + 1);

      grid.appendChild(pagination);
    }
  }

  function changePage(page) {
    currentPage = page;
    renderImages();
  }

  function showModal(path, door, timestamp, isVideo = false) {
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modal-image');

    modal.style.display = 'block';

    if (isVideo) {
      modalImg.outerHTML = `<video id="modal-image" src="${path}" controls style="max-width: 90vw; max-height: 70vh;"></video>`;
    } else {
      modalImg.outerHTML = `<img id="modal-image" src="${path}" alt="Full size">`;
    }

    // Re-get the element after replacing it
    const mediaEl = document.getElementById('modal-image');

    document.getElementById('modal-download').onclick = () => {
      window.location.href = `/download/${door}/${timestamp}`;
    };

    document.getElementById('modal-delete').onclick = () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          action: 'delete_image',
          door,
          timestamp,
          path: path          // ← Send the full path so backend knows if it's a video
        }));
        document.getElementById('modal').style.display = 'none';
      }
    };

    document.getElementById('modal-close').onclick = () => {
      modal.style.display = 'none';
    };
  }

  // Event listeners
  document.getElementById('refresh-images').onclick = fetchImages;
  document.getElementById('date-filter').onchange = fetchImages;


  document.getElementById('download-all').onclick = () => {
    const door = document.getElementById('door-filter').value;
    const url = door === 'all' ? '/download_zip/all' : `/download_zip/${door}`;
    window.location.href = url;
  };

  // Start everything
  connectWebSocket();
</script>
