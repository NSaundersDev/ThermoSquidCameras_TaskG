<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Manager</title>
  <link rel="stylesheet" href="/css/image_manager.css">

</head>
<body>
  <header>
    <h1>IMAGE MANAGER</h1>
    <nav>
      <select id="door-filter">
        <option value="all">All Doors</option>
        <option value="front">Front</option>
        <option value="back">Back</option>
      </select>
      <input type="date" id="date-filter">
      <button id="refresh-images">Refresh</button>
      <button id="delete-old-images">Delete Old Images (7 Days+)</button>
      <button id="download-all">Download All Filtered</button>
    </nav>
  </header>
  <main>
    <div id="image-grid"></div>
  </main>
  <div id="modal" class="modal">
    <span id="modal-close" class="modal-close">&times;</span>
    <img id="modal-image" src="" alt="Full-size image">
    <div class="modal-actions">
      <button id="modal-download">Download</button>
      <button id="modal-delete">Delete</button>
    </div>
  </div>
  <div id="status-message"></div>

</body>
</html>
<script type="module" src="./js/config.js">
import { Config } from './js/config.js';

let ws = new WebSocket(Config.getSocketUrl(Config.IPs.DEV2, 3000) + '/ws');;
    let currentImages = [];
    ws.onopen = () => {
      console.log('Image WebSocket connected');
      fetchImages();
    };

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        console.log('WebSocket received:', data);
        if (data.status === 'image_list') {
          currentImages = data.images;
          renderImages();
        } else if (data.status === 'deleted' || data.status === 'deleted_old') {
          document.getElementById('status-message').textContent = data.status === 'deleted' ? `Deleted image for ${data.door} at ${new Date(data.timestamp).toLocaleString()}` : `Deleted ${data.count} old images for ${data.door}`;
          fetchImages();
        } else if (data.status === 'error') {
          document.getElementById('status-message').textContent = data.message;
        }
        
      } catch (err) {
        console.error('WebSocket message error:', err);
      }
      showStatus();
    };

    ws.onclose = () => {
      document.getElementById('status-message').textContent = 'Image WebSocket disconnected';
    };

    ws.onerror = (error) => {
      console.error('WebSocket error:', error);
      document.getElementById('status-message').textContent = 'Image WebSocket error';
    };

    function fetchImages() {
      const door = document.getElementById('door-filter').value;
      const date = document.getElementById('date-filter').value;
      console.log('Fetching images:', { door, date });
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          action: 'list_images',
          door: door === 'all' ? null : door,
          date: date || null
        }));
      }
    }
   function showStatus(message, duration = 3000, isError = false) {
    const status = document.getElementById('status-message');
    status.textContent = message;
    status.classList.add(isError ? 'error' : 'fade-in');
    status.style.display = 'block';
    setTimeout(() => {
      status.classList.remove('fade-in');
      status.classList.add('fade-out');
      setTimeout(() => {
        status.textContent = '';
        status.style.display = 'none';
        status.classList.remove('fade-out', 'error');
      }, 300);
    }, duration);
  }

    function renderImages() {
      const grid = document.getElementById('image-grid');
      grid.innerHTML = '';
      const imagesPerPage = 20;
      const start = (currentPage - 1) * imagesPerPage;
      const end = start + imagesPerPage;
      const paginatedImages = currentImages.slice(start, end);
      paginatedImages.forEach(img => {
        const card = document.createElement('div');
        card.className = 'image-card';
        card.innerHTML = `
          <img src="${img.path}" alt="${img.door} image" loading="lazy">
          <p>${new Date(img.timestamp).toLocaleString()}</p>
          <button onclick="showModal('${img.path}', '${img.door}', ${img.timestamp})">View</button>
        `;
        grid.appendChild(card);
      });
      const pagination = document.createElement('div');
      pagination.className = 'pagination';
      pagination.innerHTML = `
        <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>Previous</button>
        <span>Page ${currentPage}</span>
        <button onclick="changePage(${currentPage + 1})" ${end >= currentImages.length ? 'disabled' : ''}>Next</button>
      `;
      grid.appendChild(pagination);
    }
    
    let currentPage = 1;
    function changePage(page) {
      currentPage = page;
      renderImages();
    }


function showModal(path, door, timestamp) {
  const modal = document.getElementById('modal');
  const modalImg = document.getElementById('modal-image');
  console.log('Opening modal for:', { path, door, timestamp });
  modalImg.src = path;
  modal.style.display = 'block';
  document.getElementById('modal-download').onclick = () => {
    const url = `/download/${door}/${new Date(timestamp).toISOString().split('T')[0]}/${timestamp}`;
    console.log('Attempting download:', url);
    // Use fetch to check if the endpoint works
    fetch(url)
      .then(response => {
        if (!response.ok) {
          throw new Error(`Download failed: ${response.statusText}`);
        }
        window.location.href = url; // Proceed with download
        showStatus(`Downloading ${door} image`, 3000);
      })
      .catch(error => {
        console.error('Download error:', error);
        showStatus(`Failed to download image: ${error.message}`, 5000, true);
      });
  };
  document.getElementById('modal-delete').onclick = () => {
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ action: 'delete_image', door, timestamp }));
      modal.style.display = 'none';
    }
  };
}
      document.getElementById('modal-close').onclick = () => {
      document.getElementById('modal').style.display = 'none';
    };

    document.getElementById('refresh-images').onclick = fetchImages;
    document.getElementById('delete-old-images').onclick = () => {
      const door = document.getElementById('door-filter').value;
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ action: 'delete_old_images', door: door === 'all' ? 'front' : door }));
        if (door === 'all') {
          ws.send(JSON.stringify({ action: 'delete_old_images', door: 'back' }));
        }
      }
    };
document.getElementById('download-all').onclick = () => {
  const door = document.getElementById('door-filter').value;
  const url = door === 'all' ? '/download_zip/all' : `/download_zip/${door}`;
  console.log('Download all:', url);
  fetch(url)
    .then(response => {
      if (!response.ok) {
        throw new Error(`ZIP download failed: ${response.statusText}`);
      }
      window.location.href = url; // Proceed with download
      showStatus(`Downloading ${door} images as ZIP`, 3000);
    })
    .catch(error => {
      console.error('ZIP download error:', error);
      showStatus(`Failed to download ZIP: ${error.message}`, 5000, true);
    });
};
    document.getElementById('door-filter').onchange = fetchImages;
    document.getElementById('date-filter').onchange = fetchImages;
</script>
